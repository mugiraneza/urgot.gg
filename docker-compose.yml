services:
  api:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: urgot-api
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-key-change-me}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,api}
      RIOT_KEY: ${RIOT_KEY:-}
      RIOT_IMPORT_WORKERS: ${RIOT_IMPORT_WORKERS:-5}
    volumes:
      - ./back:/app
    ports:
      - "8000:8000"
    command: >
      sh -c "
        python manage.py migrate &&
        gunicorn back.wsgi:application --bind 0.0.0.0:8000 --workers=3
      "

  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: urgot-frontend
    depends_on:
      - api
    ports:
      - "80:80"

