services:
  api:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: urgot-api
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-key-change-me}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,api}
      RIOT_KEY: ${RIOT_KEY:-}
      RIOT_IMPORT_WORKERS: ${RIOT_IMPORT_WORKERS:-5}
      API_GUNICORN_WORKERS: ${API_GUNICORN_WORKERS:-2}
      RIOT_IMPORT_CACHE_MAX_SIZE: ${RIOT_IMPORT_CACHE_MAX_SIZE:-1000}
    volumes:
      - ./back:/app
    ports:
      - "8000:8000"
    mem_limit: ${API_MEM_LIMIT:-768m}
    mem_reservation: ${API_MEM_RESERVATION:-512m}
    command: >
      sh -c "
        python manage.py migrate &&
        gunicorn back.wsgi:application --bind 0.0.0.0:8000 --workers=${API_GUNICORN_WORKERS:-2}
      "

  import-worker:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: urgot-import-worker
    depends_on:
      - api
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-key-change-me}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,api}
      RIOT_KEY: ${RIOT_KEY:-}
      RIOT_IMPORT_WORKERS: ${RIOT_IMPORT_WORKERS:-5}
      RIOT_IMPORT_CACHE_MAX_SIZE: ${RIOT_IMPORT_CACHE_MAX_SIZE:-1000}
    volumes:
      - ./back:/app
    mem_limit: ${IMPORT_WORKER_MEM_LIMIT:-512m}
    mem_reservation: ${IMPORT_WORKER_MEM_RESERVATION:-256m}
    command: >
      sh -c "
        python manage.py poll_tracked_imports --interval-minutes 15
      "

  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: urgot-frontend
    depends_on:
      - api
    ports:
      - "80:80"
    mem_limit: ${FRONTEND_MEM_LIMIT:-256m}
    mem_reservation: ${FRONTEND_MEM_RESERVATION:-128m}
